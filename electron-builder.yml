appId: sh.wolffi.app
productName: Wolffish
directories:
  buildResources: build
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{.eslintcache,eslint.config.mjs,.prettierignore,.prettierrc.yaml,dev-app-update.yml,README.md}'
  - '!{.env,.env.*,.npmrc,pnpm-lock.yaml}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'
asarUnpack:
  - resources/**
extraResources:
  - from: src/defaults
    to: defaults
    filter:
      - '**/*'
      - '!**/node_modules/**'
      - '!**/package-lock.json'
      - '!**/.wolffish-installed'
  - from: src/changelog
    to: changelog
win:
  executableName: wolffish
  icon: resources/icons-win/icons/icon.ico
  target: nsis
nsis:
  artifactName: ${name}-${version}-setup.${ext}
  shortcutName: ${productName}
  uninstallDisplayName: ${productName}
  createDesktopShortcut: always
  include: build/installer.nsh
mac:
  icon: resources/icons/icons/icon.icns
  entitlementsInherit: build/entitlements.mac.plist
  extendInfo:
    - NSCameraUsageDescription: Application requests access to the device's camera.
    - NSMicrophoneUsageDescription: Application requests access to the device's microphone.
    - NSDocumentsFolderUsageDescription: Application requests access to the user's Documents folder.
    - NSDownloadsFolderUsageDescription: Application requests access to the user's Downloads folder.
  notarize: true
  hardenedRuntime: true
  x64ArchFiles: 'Contents/Resources/app.asar.unpacked/node_modules/**/*.{node,dylib}'
  target:
    - target: dmg
      arch:
        - universal
    - target: zip
      arch:
        - universal
  category: public.app-category.productivity
dmg:
  artifactName: ${name}-${version}.${ext}
linux:
  icon: resources/icons-win/icons
  target:
    - AppImage
  maintainer: wolffi.sh
  category: Utility
appImage:
  artifactName: ${name}-${version}.${ext}
npmRebuild: false
publish:
  provider: generic
  url: https://releases.wolffi.sh
