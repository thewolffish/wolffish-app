appId: sh.wolffi.app
productName: Wolffish
directories:
  buildResources: build
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{.eslintcache,eslint.config.mjs,.prettierignore,.prettierrc.yaml,dev-app-update.yml,README.md}'
  - '!{.env,.env.*,.npmrc,pnpm-lock.yaml}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'
asarUnpack:
  - resources/**
extraResources:
  - from: src/defaults
    to: defaults
    filter:
      - '**/*'
      - '!**/node_modules/**'
      - '!**/package-lock.json'
      - '!**/.wolffish-installed'
  - from: src/changelog
    to: changelog
win:
  executableName: wolffish
  icon: resources/icons-win/icons/icon.ico
  target: nsis
nsis:
  artifactName: ${name}-${version}-setup.${ext}
  shortcutName: ${productName}
  uninstallDisplayName: ${productName}
  createDesktopShortcut: always
  include: build/installer.nsh
mac:
  icon: resources/icons/icons/icon.icns
  entitlementsInherit: build/entitlements.mac.plist
  extendInfo:
    - NSCameraUsageDescription: Application requests access to the device's camera.
    - NSMicrophoneUsageDescription: Application requests access to the device's microphone.
    - NSDocumentsFolderUsageDescription: Application requests access to the user's Documents folder.
    - NSDownloadsFolderUsageDescription: Application requests access to the user's Downloads folder.
  notarize: true
  hardenedRuntime: true
  x64ArchFiles: 'Contents/Resources/app.asar.unpacked/node_modules/**/*.{node,dylib}'
  target:
    - target: dmg
      arch:
        - universal
    - target: zip
      arch:
        - universal
  category: public.app-category.productivity
dmg:
  artifactName: ${name}-${version}.${ext}
linux:
  icon: resources/icons-win/icons
  # AppImage is the auto-update channel: electron-updater self-updates the AppImage in
  # place via latest-linux.yml. deb/rpm install natively into the system app menu but
  # CANNOT self-update — electron-updater can replace an AppImage, not run a package
  # manager. deb/rpm users update by reinstalling. See .github/workflows/release.yml.
  target:
    - AppImage
    - deb
    - rpm
  maintainer: Younes Alturkey <younes@wolffi.sh>
  vendor: wolffi.sh
  # Drives the .desktop `Categories=` field (electron-builder appends the trailing ';').
  # This is NOT the deb Section / rpm Group (those come from packageCategory), so a
  # multi-value list here is safe and only affects application-menu placement.
  category: Utility;Development
  # Short summary — used as the deb short description and the rpm summary. The longer
  # .desktop `Comment=` and the deb/rpm body description come from package.json#description.
  synopsis: Personal AI agent that runs locally with full system access
  desktop:
    entry:
      # Name and StartupWMClass both already default to productName ("Wolffish"); set
      # explicitly so window grouping is guaranteed. Comment and Categories are deliberately
      # NOT set here — electron-builder always overrides desktop.entry.Comment (from the app
      # description) and desktop.entry.Categories (from `category` above), so those values
      # live on the keys above instead of being silently dropped here.
      Name: Wolffish
      StartupWMClass: Wolffish
appImage:
  # Arch in the name so x64 and arm64 AppImages don't collide (deb/rpm already
  # include arch by default). Consumers read the URL from latest-linux*.yml /
  # install.sh's manifest parse, so the rename is transparent.
  artifactName: ${name}-${version}-${arch}.${ext}
npmRebuild: false
publish:
  provider: generic
  url: https://releases.wolffi.sh
